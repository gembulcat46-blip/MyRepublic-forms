<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Pendaftaran MyRepublic | Installasi Fiber Optik</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #4A148C 0%, #1A0B2E 100%);
            position: relative;
            padding: 2rem 1.5rem;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 40%, rgba(156, 39, 176, 0.15) 2px, transparent 2px),
                radial-gradient(circle at 70% 85%, rgba(103, 58, 183, 0.2) 1px, transparent 2px),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 2px, transparent 2px, transparent 8px);
            background-repeat: repeat, repeat, repeat;
            background-size: 40px 40px, 60px 60px, auto;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-circle {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(6px);
            width: 80px;
            height: 80px;
            border-radius: 40px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(156,39,176,0.5);
            margin-bottom: 1rem;
        }

        .logo-circle i {
            font-size: 48px;
            color: white;
            filter: drop-shadow(0 0 6px #9C27B0);
        }

        .brand h1 {
            color: white;
            font-weight: 600;
            font-size: 1.9rem;
            letter-spacing: -0.5px;
            text-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }

        .brand p {
            color: rgba(255,255,240,0.85);
            font-weight: 400;
            margin-top: 6px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.3), 0 0 0 1px rgba(156, 39, 176, 0.3), 0 0 0 4px rgba(156, 39, 176, 0.2);
            transition: box-shadow 0.3s, transform 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .glass-card:hover {
            box-shadow: 0 30px 55px rgba(0, 0, 0, 0.4), 0 0 0 2px #9C27B0, 0 0 12px #9C27B0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .full-width {
            grid-column: span 2;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .input-group label {
            font-weight: 500;
            color: #f0eef7;
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .input-group label i {
            width: 20px;
            color: #d29bf0;
        }

        .input-group input, 
        .input-group textarea {
            background: rgba(20, 10, 35, 0.65);
            border: 1px solid rgba(156, 39, 176, 0.5);
            border-radius: 14px;
            padding: 12px 16px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: white;
            transition: all 0.2s;
            outline: none;
            backdrop-filter: blur(4px);
        }

        .input-group input:focus,
        .input-group textarea:focus {
            border-color: #ce93d8;
            box-shadow: 0 0 10px rgba(156, 39, 176, 0.5);
            background: rgba(30, 15, 50, 0.8);
        }

        .input-group input::placeholder,
        .input-group textarea::placeholder {
            color: rgba(220, 200, 255, 0.5);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .file-label {
            background: rgba(156, 39, 176, 0.25);
            border-radius: 14px;
            padding: 8px 12px;
            text-align: center;
            cursor: pointer;
            border: 1px dashed #ba6bc9;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 500;
        }

        .file-label:hover {
            background: rgba(156, 39, 176, 0.45);
            border-color: #e1a0f0;
        }

        .file-label i {
            font-size: 1.2rem;
        }

        input[type="file"] {
            display: none;
        }

        .file-name {
            font-size: 0.75rem;
            color: #d9c8ff;
            margin-top: 6px;
            word-break: break-all;
        }

        .btn-submit {
            width: 100%;
            background: linear-gradient(95deg, #9C27B0, #6a1b9a);
            border: none;
            padding: 14px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 1.1rem;
            font-family: 'Poppins', sans-serif;
            color: white;
            margin-top: 1rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .btn-submit:hover:not(:disabled) {
            background: linear-gradient(95deg, #b43bcb, #7b1fa2);
            transform: scale(1.01);
            box-shadow: 0 0 15px #9C27B0;
        }

        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .toast-notif {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1b1429;
            backdrop-filter: blur(15px);
            color: #fff;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 500;
            z-index: 999;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            border-left: 5px solid #9C27B0;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.2s;
            font-size: 0.9rem;
            pointer-events: none;
            opacity: 0;
        }

        .toast-notif.show {
            opacity: 1;
        }

        footer {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255,255,240,0.5);
            font-size: 0.75rem;
        }

        @media (max-width: 700px) {
            body {
                padding: 1.2rem;
            }
            .form-grid {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            .full-width {
                grid-column: span 1;
            }
            .glass-card {
                padding: 1.5rem;
            }
        }

        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            margin-top: 1rem;
            overflow: hidden;
            display: none;
        }

        .progress-bar.active {
            display: block;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #9C27B0, #e1a0f0);
            border-radius: 3px;
            transition: width 0.3s;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand">
        <div class="logo-circle">
            <i class="fas fa-cloud-upload-alt"></i>
        </div>
        <h1>MyRepublic <span style="font-weight:300">|</span> Fiber Optik</h1>
        <p>Daftar instalasi internet cepat & stabil</p>
    </div>

    <div class="glass-card">
        <form id="registrationForm" enctype="multipart/form-data">
            <div class="form-grid">
                <div class="input-group full-width">
                    <label><i class="fas fa-user"></i> Nama Lengkap</label>
                    <input type="text" id="nama" name="nama" placeholder="Contoh: Ahmad Fauzan" required>
                </div>
                <div class="input-group full-width">
                    <label><i class="fas fa-map-marker-alt"></i> Alamat Lengkap</label>
                    <textarea id="alamat" name="alamat" rows="2" placeholder="Jl. Contoh No. 12, RT/RW, Kelurahan, Kecamatan, Kota" required></textarea>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-phone-alt"></i> Nomor HP</label>
                    <input type="tel" id="nohp" name="nohp" placeholder="08xxxxxxxxxx" required>
                </div>
                <div class="input-group">
                    <label><i class="fas fa-envelope"></i> Alamat Email</label>
                    <input type="email" id="email" name="email" placeholder="email@domain.com" required>
                </div>
                <div class="input-group full-width">
                    <label><i class="fas fa-id-card"></i> NIK KTP</label>
                    <input type="text" id="nik" name="nik" placeholder="16 digit NIK" maxlength="16" required>
                </div>
                
                <div class="input-group">
                    <label><i class="fas fa-home"></i> Foto Tampak Depan Rumah</label>
                    <div class="file-label" onclick="document.getElementById('fotoDepan').click()">
                        <i class="fas fa-upload"></i> Pilih gambar
                    </div>
                    <input type="file" id="fotoDepan" name="foto_depan" accept="image/*" required>
                    <div class="file-name" id="depanFileName">Belum ada file</div>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-arrow-left"></i> Foto Serong Kiri</label>
                    <div class="file-label" onclick="document.getElementById('fotoKiri').click()">
                        <i class="fas fa-upload"></i> Pilih gambar
                    </div>
                    <input type="file" id="fotoKiri" name="foto_kiri" accept="image/*" required>
                    <div class="file-name" id="kiriFileName">Belum ada file</div>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-arrow-right"></i> Foto Serong Kanan</label>
                    <div class="file-label" onclick="document.getElementById('fotoKanan').click()">
                        <i class="fas fa-upload"></i> Pilih gambar
                    </div>
                    <input type="file" id="fotoKanan" name="foto_kanan" accept="image/*" required>
                    <div class="file-name" id="kananFileName">Belum ada file</div>
                </div>

                <div class="input-group">
                    <label><i class="fas fa-bolt"></i> Foto Meteran Listrik</label>
                    <div class="file-label" onclick="document.getElementById('fotoMeter').click()">
                        <i class="fas fa-upload"></i> Pilih gambar
                    </div>
                    <input type="file" id="fotoMeter" name="foto_meter" accept="image/*" required>
                    <div class="file-name" id="meterFileName">Belum ada file</div>
                </div>
            </div>
            <div class="progress-bar" id="progressBar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <button type="submit" class="btn-submit"><i class="fab fa-telegram-plane"></i> Kirim Pendaftaran</button>
        </form>
    </div>
    <footer>© MyRepublic Indonesia • Layanan Fiber Optic • Data Anda Aman</footer>
</div>

<div id="toastMsg" class="toast-notif"><i class="fas fa-check-circle" style="color:#b77ee0;"></i> <span id="toastText">Berhasil!</span></div>

<script>
    function updateFileName(inputId, displayId) {
        const input = document.getElementById(inputId);
        const displaySpan = document.getElementById(displayId);
        if(input.files.length > 0) {
            displaySpan.innerText = input.files[0].name.length > 28 ? input.files[0].name.substring(0,25)+"..." : input.files[0].name;
        } else {
            displaySpan.innerText = "Belum ada file";
        }
    }
    
    document.getElementById('fotoDepan').addEventListener('change', ()=> updateFileName('fotoDepan','depanFileName'));
    document.getElementById('fotoKiri').addEventListener('change', ()=> updateFileName('fotoKiri','kiriFileName'));
    document.getElementById('fotoKanan').addEventListener('change', ()=> updateFileName('fotoKanan','kananFileName'));
    document.getElementById('fotoMeter').addEventListener('change', ()=> updateFileName('fotoMeter','meterFileName'));

    function validateForm() {
        const nama = document.getElementById('nama').value.trim();
        const alamat = document.getElementById('alamat').value.trim();
        const nohp = document.getElementById('nohp').value.trim();
        const email = document.getElementById('email').value.trim();
        const nik = document.getElementById('nik').value.trim();
        const fotoDepan = document.getElementById('fotoDepan').files.length;
        const fotoKiri = document.getElementById('fotoKiri').files.length;
        const fotoKanan = document.getElementById('fotoKanan').files.length;
        const fotoMeter = document.getElementById('fotoMeter').files.length;

        if(!nama || !alamat || !nohp || !email || !nik) {
            showToast("⚠️ Semua field teks harus diisi!", true);
            return false;
        }
        if(!/^\S+@\S+\.\S+$/.test(email)) {
            showToast("Email tidak valid!", true);
            return false;
        }
        if(nohp.length < 9 || isNaN(nohp.replace(/[^\d]/g,''))) {
            showToast("Nomor HP tidak valid!", true);
            return false;
        }
        if(nik.length < 15 || nik.length > 16 || isNaN(nik)) {
            showToast("NIK KTP harus 16 digit angka!", true);
            return false;
        }
        if(fotoDepan === 0 || fotoKiri === 0 || fotoKanan === 0 || fotoMeter === 0) {
            showToast("Harap upload keempat foto yang diperlukan!", true);
            return false;
        }
        return true;
    }

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toastMsg');
        const textSpan = document.getElementById('toastText');
        textSpan.innerText = msg;
        if(isError) {
            toast.style.borderLeftColor = "#ff4d4d";
            toast.querySelector('i').className = "fas fa-exclamation-triangle";
        } else {
            toast.style.borderLeftColor = "#9C27B0";
            toast.querySelector('i').className = "fas fa-check-circle";
        }
        toast.classList.add('show');
        setTimeout(() => {
            toast.classList.remove('show');
        }, 4000);
    }

    const form = document.getElementById('registrationForm');
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if(!validateForm()) return;

        const submitBtn = document.querySelector('.btn-submit');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Mengirim...';
        submitBtn.disabled = true;
        progressBar.classList.add('active');
        
        let progress = 0;
        const interval = setInterval(() => {
            progress = Math.min(progress + 10, 90);
            progressFill.style.width = progress + '%';
        }, 200);

        try {
            const formData = new FormData(form);
            
            const response = await fetch('/.netlify/functions/submit', {
                method: 'POST',
                body: formData
            });
            
            const result = await response.json();
            
            if(result.success) {
                progressFill.style.width = '100%';
                setTimeout(() => {
                    showToast("✅ Pendaftaran berhasil! Admin akan menghubungi Anda.");
                    form.reset();
                    ['depanFileName','kiriFileName','kananFileName','meterFileName'].forEach(id => 
                        document.getElementById(id).innerText = "Belum ada file");
                }, 500);
            } else {
                throw new Error(result.message || 'Gagal mengirim');
            }
        } catch(err) {
            console.error(err);
            showToast("❌ Gagal mengirim pendaftaran. Silakan coba lagi.", true);
        } finally {
            clearInterval(interval);
            setTimeout(() => {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
                progressBar.classList.remove('active');
                progressFill.style.width = '0%';
            }, 1000);
        }
    });
</script>
</body>
</html>
